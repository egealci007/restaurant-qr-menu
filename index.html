<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yemekhane Menü</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- ✅ Kesin Çalışan Favicon Sistemi (Cache kırıldı) -->
<link rel="icon" href="/restaurant-qr-menu/favicon.ico?v=2" sizes="any">
<link rel="shortcut icon" href="/restaurant-qr-menu/favicon.ico?v=2">
<link rel="apple-touch-icon" href="/restaurant-qr-menu/favicon.ico?v=2">
<meta name="theme-color" content="#070b14">

</head>
<body>
<header>
  <img id="siteLogo" src="logo.png" alt="Yemekhane Logo">

  <button id="backBtn" style="display:none;" aria-label="Geri">← Geri</button>
  <button id="themeToggle">☀️</button>
</header>

<!-- ✅ Karşılama / Welcome ekranı -->
<div id="welcomeView" class="welcome" style="display:none;">
  <div class="welcome-card premium">

    <h1 class="welcome-title">HOŞ GELDİNİZ 👋</h1>
    <h2 class="welcome-brand">Yemekhane</h2>
    <p class="welcome-sub">Afiyetle lezzet yolculuğuna başlayın</p>

    <div class="welcome-actions">
      <button id="btnShowMenu" class="wbtn primary big">
        🍽️ Menüyü Gör
      </button>

      <a class="wbtn light" href="https://instagram.com/" target="_blank">
        📸 Instagram
      </a>

      <a class="wbtn light" href="https://maps.app.goo.gl/YLzNaBpiHCmsQo3m6" target="_blank">
        📍 Yol Tarifi Al
      </a>

      <a class="wbtn light" href="tel:+905000000000">
        📞 İletişime Geç
      </a>
    </div>

  </div>
</div>

<div id="homeView">
  <div class="categories" id="categories"></div>
</div>

<div id="menuView" style="display:none;">
  <div class="menu" id="menu"></div>
</div>

<script src="script.js"></script>
</body>
</html>
